name: Browser automation compute proof

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/browser-automation-compute-proof.yml"

permissions:
  contents: read

jobs:
  chromium-proof:
    name: Verify headless Chromium browser compute
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright/python:v1.60.0-noble
      options: --user 1001
    timeout-minutes: 15

    steps:
      - name: Execute browser automation proof
        run: |
          python -m pip install --user --quiet playwright==1.60.0
          python - <<'PY'
          import asyncio
          import hashlib
          import json
          import os
          import platform
          import time
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch()
                  page = await browser.new_page(viewport={"width": 960, "height": 540}, device_scale_factor=1)
                  await page.set_content("""
                  <!doctype html>
                  <html>
                    <head>
                      <title>Free Compute Browser Proof</title>
                      <style>
                        body { font-family: system-ui, sans-serif; margin: 48px; color: #10231e; }
                        main { border: 2px solid #0d6a54; padding: 32px; width: 640px; }
                        h1 { margin: 0 0 12px; font-size: 34px; }
                        p { font-size: 18px; }
                      </style>
                    </head>
                    <body>
                      <main>
                        <h1>Browser compute secured</h1>
                        <p>Chromium rendered this page inside a hosted Playwright job.</p>
                        <div id="result"></div>
                      </main>
                    </body>
                  </html>
                  """)
                  js_result = await page.evaluate("""
                    () => {
                      let acc = 0;
                      for (let i = 0; i < 250000; i++) {
                        acc = (acc + ((i * 2654435761) >>> 0)) >>> 0;
                      }
                      document.querySelector('#result').textContent = `js_result=${acc}`;
                      return acc;
                    }
                  """)
                  title = await page.title()
                  user_agent = await page.evaluate("() => navigator.userAgent")
                  screenshot = await page.screenshot(full_page=True)
                  await browser.close()

              proof = {
                  "status": "secured",
                  "surface": "github-actions-playwright-browser-compute",
                  "container_image": "mcr.microsoft.com/playwright/python:v1.60.0-noble",
                  "browser": "chromium",
                  "browser_version": browser.version,
                  "title": title,
                  "user_agent": user_agent,
                  "js_result": js_result,
                  "screenshot_bytes": len(screenshot),
                  "screenshot_sha256": hashlib.sha256(screenshot).hexdigest(),
                  "github_repository": os.environ.get("GITHUB_REPOSITORY"),
                  "runner_os": os.environ.get("RUNNER_OS"),
                  "runner_arch": os.environ.get("RUNNER_ARCH"),
                  "python": platform.python_version(),
                  "platform": platform.platform(),
                  "created_at_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              }
              print(json.dumps(proof, indent=2, sort_keys=True))

              assert proof["status"] == "secured"
              assert proof["surface"] == "github-actions-playwright-browser-compute"
              assert proof["title"] == "Free Compute Browser Proof"
              assert proof["js_result"] == 1547820728
              assert proof["screenshot_bytes"] > 10000

          asyncio.run(main())
          PY
