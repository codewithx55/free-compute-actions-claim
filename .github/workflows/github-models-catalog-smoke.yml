name: GitHub Models Catalog Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/github-models-catalog-smoke.yml"
      - "scripts/github_models_catalog_smoke.py"

permissions:
  contents: read
  models: read

jobs:
  prove-model-catalog:
    name: Prove GitHub Models catalog and multi-model inference
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run catalog and inference smoke
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/github_models_catalog_smoke.py
