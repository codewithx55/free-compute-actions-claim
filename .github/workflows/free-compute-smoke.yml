name: Free Compute Smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  prove-runner:
    name: Prove ${{ matrix.os }} public runner
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Runner identity
        shell: bash
        run: |
          echo "RUNNER_OS=${RUNNER_OS}"
          echo "RUNNER_ARCH=${RUNNER_ARCH}"
          echo "GITHUB_REPOSITORY=${GITHUB_REPOSITORY}"

      - name: Python smoke benchmark
        run: python scripts/smoke.py
