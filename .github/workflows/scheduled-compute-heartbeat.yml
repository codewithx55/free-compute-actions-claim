name: Scheduled Compute Heartbeat

on:
  workflow_dispatch:
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: read

jobs:
  heartbeat:
    name: Prove scheduled compute
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Emit scheduled compute proof
        run: python scripts/scheduled_heartbeat.py
